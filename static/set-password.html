<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARMAAN II — Set Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f2341 0%, #1a3a5c 50%, #0f2341 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 16px;
    padding: 48px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  }
  .logo-area { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1565C0, #42A5F5);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff; margin-bottom: 12px;
  }
  h2 { font-size: 18px; font-weight: 700; color: #0f2341; }
  p  { font-size: 13px; color: #64748b; margin-top: 4px; }
  .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
  input[type=password] {
    width: 100%; padding: 11px 12px 11px 38px;
    border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 14px; font-family: inherit; outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #2563eb; }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #1565C0, #2196F3);
    color: #fff; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
  .msg-err { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }
  .msg-ok  { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
  .spinning { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h2>Set Your Password</h2>
    <p>Choose a secure password to activate your account</p>
  </div>
  <hr class="divider">
  <div class="msg msg-err" id="errMsg"></div>
  <div class="msg msg-ok"  id="okMsg"></div>
  <form id="form" onsubmit="doSet(event)">
    <label>New Password</label>
    <div class="input-wrap">
      <i class="bi bi-lock"></i>
      <input type="password" id="pw1" placeholder="At least 8 characters" minlength="8" required>
    </div>
    <label>Confirm Password</label>
    <div class="input-wrap">
      <i class="bi bi-lock-fill"></i>
      <input type="password" id="pw2" placeholder="Repeat password" minlength="8" required>
    </div>
    <button type="submit" class="btn" id="btn">
      <i class="bi bi-check-circle"></i> Set Password
    </button>
  </form>
</div>
<script>
async function doSet(e) {
  e.preventDefault();
  const err = document.getElementById('errMsg');
  const ok  = document.getElementById('okMsg');
  const btn = document.getElementById('btn');
  err.style.display = ok.style.display = 'none';

  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }

  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  if (!token) { err.textContent = 'Invalid link – no token found.'; err.style.display = 'block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-arrow-repeat spinning"></i> Saving…';
  try {
    const res  = await fetch('/api/auth/set-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw1 }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed');
    localStorage.setItem('access_token', data.access_token);
    ok.textContent = 'Password set! Redirecting…';
    ok.style.display = 'block';
    setTimeout(() => { window.location = '/coverage'; }, 1500);
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle"></i> Set Password';
  }
}
</script>
</body>
</html>
